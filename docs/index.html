<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>a11y-checker</title>
<style>
  :root {
    --critical: #ff4444;
    --serious: #cc7a00;
    --moderate: #b8960c;
    --minor: #4488cc;
    --bg: #0a0a0a;
    --surface: #111111;
    --grid: #1a1a1a;
    --border: #222222;
    --text: #d0d0d0;
    --muted: #666666;
    --accent: #ffffff;
    --dim: #333333;
    --green: #44aa44;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: "SF Mono", "Fira Code", "JetBrains Mono", "Cascadia Code", monospace;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    min-height: 100vh;
    background-image:
      linear-gradient(var(--grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  /* --- URL INPUT --- */
  .input-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem;
  }

  .input-screen h1 {
    font-size: 1.8rem;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: -0.02em;
    margin-bottom: 0.25rem;
  }

  .input-screen .tagline {
    font-size: 0.8rem;
    color: var(--muted);
    margin-bottom: 2.5rem;
  }

  .url-form {
    display: flex;
    gap: 0;
    width: 100%;
    max-width: 560px;
  }

  .url-form input {
    flex: 1;
    padding: 0.7rem 1rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-right: none;
    border-radius: 4px 0 0 4px;
    color: var(--accent);
    font-family: inherit;
    font-size: 0.88rem;
    outline: none;
  }

  .url-form input:focus {
    border-color: var(--dim);
  }

  .url-form input::placeholder {
    color: var(--muted);
  }

  .url-form button {
    padding: 0.7rem 1.5rem;
    background: var(--accent);
    color: var(--bg);
    border: 1px solid var(--accent);
    border-radius: 0 4px 4px 0;
    font-family: inherit;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
  }

  .url-form button:hover {
    background: #e0e0e0;
  }

  .url-form button:disabled {
    opacity: 0.4;
    cursor: default;
  }

  .input-hints {
    margin-top: 1.5rem;
    font-size: 0.75rem;
    color: var(--muted);
    text-align: center;
    line-height: 1.8;
  }

  .input-hints kbd {
    padding: 0.1rem 0.4rem;
    border: 1px solid var(--border);
    border-radius: 3px;
    font-size: 0.72rem;
    background: var(--surface);
  }

  .badge {
    display: inline-block;
    padding: 0.15rem 0.5rem;
    border: 1px solid var(--border);
    border-radius: 3px;
    font-size: 0.68rem;
    color: var(--muted);
    margin: 0 0.15rem;
  }

  .gh-pages-notice {
    margin-top: 2rem;
    padding: 1rem 1.25rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    font-size: 0.78rem;
    color: var(--muted);
    max-width: 560px;
    display: none;
    line-height: 1.7;
  }

  .gh-pages-notice code {
    background: var(--bg);
    padding: 0.1rem 0.35rem;
    border-radius: 3px;
    color: var(--text);
  }

  /* --- DASHBOARD --- */
  .dashboard {
    display: none;
    flex-direction: column;
    height: 100vh;
  }

  .dashboard.active {
    display: flex;
  }

  .input-screen.hidden {
    display: none;
  }

  header {
    padding: 0.75rem 1.25rem;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 0.75rem;
    flex-shrink: 0;
  }

  header h1 {
    font-size: 0.9rem;
    font-weight: 600;
    color: var(--accent);
  }

  header h1 span {
    color: var(--muted);
    font-weight: 400;
  }

  .counters {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
  }

  .counter {
    padding: 0.25rem 0.6rem;
    border-radius: 3px;
    font-size: 0.75rem;
    font-weight: 600;
    background: var(--surface);
    border: 1px solid var(--border);
  }

  .counter.critical { border-left: 3px solid var(--critical); }
  .counter.serious { border-left: 3px solid var(--serious); }
  .counter.moderate { border-left: 3px solid var(--moderate); }
  .counter.minor { border-left: 3px solid var(--minor); }

  .toolbar {
    padding: 0.5rem 1.25rem;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 0.4rem;
    flex-wrap: wrap;
    align-items: center;
    flex-shrink: 0;
  }

  .toolbar label.label-text {
    font-size: 0.72rem;
    color: var(--muted);
    margin-right: 0.15rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .toggle {
    display: inline-flex;
    align-items: center;
    gap: 0.25rem;
    padding: 0.2rem 0.5rem;
    border-radius: 3px;
    font-size: 0.75rem;
    cursor: pointer;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    transition: opacity 0.15s;
  }

  .toggle.off { opacity: 0.3; }
  .toggle input { display: none; }
  .spacer { flex: 1; }

  .export-group {
    display: flex;
    gap: 0.3rem;
  }

  button.export-btn {
    padding: 0.25rem 0.6rem;
    border-radius: 3px;
    font-size: 0.72rem;
    font-family: inherit;
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    cursor: pointer;
  }

  button.export-btn:disabled { opacity: 0.3; cursor: default; }
  button.export-btn:not(:disabled):hover { border-color: var(--muted); }

  .progress {
    padding: 0.4rem 1.25rem;
    font-size: 0.75rem;
    color: var(--muted);
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  #log {
    padding: 0.75rem 1.25rem;
    overflow-y: auto;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 0.25rem;
  }

  .entry {
    padding: 0.4rem 0.65rem;
    border-radius: 3px;
    font-size: 0.78rem;
    background: var(--surface);
    border-left: 3px solid var(--border);
    word-break: break-word;
  }

  .entry.critical { border-left-color: var(--critical); }
  .entry.serious { border-left-color: var(--serious); }
  .entry.moderate { border-left-color: var(--moderate); }
  .entry.minor { border-left-color: var(--minor); }
  .entry.status { border-left-color: var(--green); color: var(--muted); }
  .entry.error { border-left-color: var(--critical); color: var(--critical); }

  .entry .impact {
    display: inline-block;
    padding: 0.05rem 0.35rem;
    border-radius: 2px;
    font-size: 0.7rem;
    font-weight: 600;
    margin-right: 0.3rem;
  }

  .entry.critical .impact { background: var(--critical); color: #fff; }
  .entry.serious .impact { background: var(--serious); color: #fff; }
  .entry.moderate .impact { background: var(--moderate); color: #000; }
  .entry.minor .impact { background: var(--minor); color: #fff; }

  .entry .url { color: var(--muted); }
  .entry .rule { font-weight: 600; color: var(--accent); }
  .entry a { color: var(--minor); text-decoration: none; }
  .entry a:hover { text-decoration: underline; }
  .entry .target { color: var(--muted); font-size: 0.72rem; }

  .entry .viewport-badge {
    display: inline-block;
    font-size: 0.65rem;
    padding: 0.02rem 0.25rem;
    border-radius: 2px;
    border: 1px solid var(--border);
    margin-left: 0.25rem;
  }

  @media (max-width: 600px) {
    .input-screen h1 { font-size: 1.4rem; }
    .url-form { flex-direction: column; }
    .url-form input { border-right: 1px solid var(--border); border-radius: 4px 4px 0 0; }
    .url-form button { border-radius: 0 0 4px 4px; }
    .counters { gap: 0.3rem; }
    .toolbar { gap: 0.3rem; }
  }
</style>
</head>
<body>

<!-- URL INPUT SCREEN -->
<div class="input-screen" id="input-screen">
  <h1>a11y-checker</h1>
  <p class="tagline">real-time WCAG 2.1 AA accessibility auditor</p>
  <form class="url-form" id="url-form">
    <input type="url" id="url-input" placeholder="https://example.com" required autofocus>
    <button type="submit" id="start-btn">Audit</button>
  </form>
  <div class="input-hints">
    <span class="badge">axe-core</span>
    <span class="badge">playwright</span>
    <span class="badge">WCAG 2.1 AA</span>
    <br>
    crawls up to 50 pages via sitemap + link discovery
  </div>
  <div class="gh-pages-notice" id="gh-notice">
    This app requires the local server.<br>
    Run <code>npm install && node server.js</code> then open <code>http://localhost:3000</code>
  </div>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">
  <header>
    <h1>a11y-checker <span id="target-label"></span></h1>
    <div class="counters">
      <div class="counter" id="total">0</div>
      <div class="counter critical" id="cnt-critical">0</div>
      <div class="counter serious" id="cnt-serious">0</div>
      <div class="counter moderate" id="cnt-moderate">0</div>
      <div class="counter minor" id="cnt-minor">0</div>
    </div>
  </header>

  <div class="toolbar">
    <label class="label-text">Severity:</label>
    <label class="toggle" data-filter="critical"><input type="checkbox" checked>critical</label>
    <label class="toggle" data-filter="serious"><input type="checkbox" checked>serious</label>
    <label class="toggle" data-filter="moderate"><input type="checkbox" checked>moderate</label>
    <label class="toggle" data-filter="minor"><input type="checkbox" checked>minor</label>
    <label class="label-text" style="margin-left:0.75rem">Viewport:</label>
    <label class="toggle" data-filter="desktop"><input type="checkbox" checked>desktop</label>
    <label class="toggle" data-filter="mobile"><input type="checkbox" checked>mobile</label>
    <span class="spacer"></span>
    <div class="export-group">
      <button class="export-btn" id="export-json" disabled>JSON</button>
      <button class="export-btn" id="export-csv" disabled>CSV</button>
    </div>
  </div>

  <div class="progress" id="progress">connecting...</div>
  <div id="log"></div>
</div>

<script>
const inputScreen = document.getElementById("input-screen");
const dashboard = document.getElementById("dashboard");
const urlForm = document.getElementById("url-form");
const urlInput = document.getElementById("url-input");
const startBtn = document.getElementById("start-btn");
const log = document.getElementById("log");
const progress = document.getElementById("progress");
const exportJson = document.getElementById("export-json");
const exportCsv = document.getElementById("export-csv");
const ghNotice = document.getElementById("gh-notice");

const counts = { total: 0, critical: 0, serious: 0, moderate: 0, minor: 0 };
const filters = { critical: true, serious: true, moderate: true, minor: true, desktop: true, mobile: true };
let autoScroll = true;
let es = null;

// Detect if running on GitHub Pages (no backend)
const isLocal = location.hostname === "localhost" || location.hostname === "127.0.0.1";

if (!isLocal) {
  ghNotice.style.display = "block";
  startBtn.disabled = true;
  urlInput.disabled = true;
  urlInput.placeholder = "requires local server";
}

// Check if server already has an audit running
if (isLocal) {
  fetch("/status").then(r => r.json()).then(d => {
    if (d.auditing && d.url) {
      showDashboard(d.url);
      connectSSE();
    }
  }).catch(() => {});
}

urlForm.addEventListener("submit", async (e) => {
  e.preventDefault();
  const url = urlInput.value.trim();
  if (!url) return;

  startBtn.disabled = true;
  startBtn.textContent = "Starting...";

  try {
    const res = await fetch("/audit", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ url }),
    });
    const data = await res.json();
    if (!res.ok) {
      alert(data.error || "Failed to start audit");
      startBtn.disabled = false;
      startBtn.textContent = "Audit";
      return;
    }
    showDashboard(url);
    connectSSE();
  } catch (err) {
    alert("Could not connect to server. Is it running?");
    startBtn.disabled = false;
    startBtn.textContent = "Audit";
  }
});

function showDashboard(url) {
  inputScreen.classList.add("hidden");
  dashboard.classList.add("active");
  try {
    document.getElementById("target-label").textContent = `— ${new URL(url).hostname}`;
    document.title = `a11y-checker — ${new URL(url).hostname}`;
  } catch (_) {
    document.getElementById("target-label").textContent = `— ${url}`;
  }
}

function connectSSE() {
  es = new EventSource("/events");

  es.addEventListener("status", (e) => {
    const d = JSON.parse(e.data);
    addEntry(d.message, "status");
  });

  es.addEventListener("page-start", (e) => {
    const d = JSON.parse(e.data);
    progress.textContent = `page ${d.pageIndex} — ${d.url}`;
    addEntry(`<strong>${d.pageIndex}:</strong> <span class="url">${d.url}</span>`, "status");
  });

  es.addEventListener("page-audit", (e) => {
    const d = JSON.parse(e.data);
    addEntry(`${d.viewport}: ${d.violationCount} violations, ${d.passCount} passed`, "status");
  });

  es.addEventListener("violation", (e) => {
    const d = JSON.parse(e.data);
    counts.total++;
    counts[d.impact] = (counts[d.impact] || 0) + 1;
    updateCounters();

    const show = filters[d.impact] !== false && filters[d.viewport] !== false;
    const html = `
      <span class="impact">${d.impact}</span>
      <span class="rule">${d.ruleId}</span>
      <span class="viewport-badge">${d.viewport}</span>
      — ${escHtml(d.help)}
      <br><span class="target">${escHtml(d.target)}</span>
      <br><span class="url">${escHtml(d.url)}</span>
      ${d.helpUrl ? ` · <a href="${escAttr(d.helpUrl)}" target="_blank" rel="noopener">docs</a>` : ""}
      ${d.wcagTags && d.wcagTags.length ? ` · <span class="url">${escHtml(d.wcagTags.join(", "))}</span>` : ""}
    `;
    const div = document.createElement("div");
    div.className = `entry violation ${d.impact}`;
    div.innerHTML = html;
    div.dataset.impact = d.impact;
    div.dataset.viewport = d.viewport;
    if (!show) div.style.display = "none";
    log.appendChild(div);
    if (autoScroll) div.scrollIntoView({ behavior: "smooth", block: "end" });
  });

  es.addEventListener("page-error", (e) => {
    const d = JSON.parse(e.data);
    addEntry(`error on ${escHtml(d.url)} (${d.viewport}): ${escHtml(d.error)}`, "error");
  });

  es.addEventListener("complete", (e) => {
    const d = JSON.parse(e.data);
    progress.textContent = `complete — ${d.totalPages} pages, ${d.totalViolations} violations`;
    addEntry(`<strong>audit complete.</strong> ${d.totalPages} pages, ${d.totalViolations} violations.`, "status");
    exportJson.disabled = false;
    exportCsv.disabled = false;
    es.close();
  });

  es.addEventListener("error", () => {
    progress.textContent = "connection lost. refresh to retry.";
  });
}

// Scroll tracking
log.addEventListener("scroll", () => {
  autoScroll = log.scrollTop + log.clientHeight >= log.scrollHeight - 40;
});

// Filters
document.querySelectorAll(".toggle").forEach((label) => {
  const cb = label.querySelector("input");
  const key = label.dataset.filter;
  cb.addEventListener("change", () => {
    filters[key] = cb.checked;
    label.classList.toggle("off", !cb.checked);
    applyFilters();
  });
});

function applyFilters() {
  log.querySelectorAll(".entry.violation").forEach((el) => {
    const show = filters[el.dataset.impact] !== false && filters[el.dataset.viewport] !== false;
    el.style.display = show ? "" : "none";
  });
}

function updateCounters() {
  document.getElementById("total").textContent = `${counts.total} total`;
  document.getElementById("cnt-critical").textContent = `${counts.critical} critical`;
  document.getElementById("cnt-serious").textContent = `${counts.serious} serious`;
  document.getElementById("cnt-moderate").textContent = `${counts.moderate} moderate`;
  document.getElementById("cnt-minor").textContent = `${counts.minor} minor`;
}

function addEntry(html, classes = "", data = {}) {
  const div = document.createElement("div");
  div.className = `entry ${classes}`;
  div.innerHTML = html;
  for (const [k, v] of Object.entries(data)) div.dataset[k] = v;
  log.appendChild(div);
  if (autoScroll) div.scrollIntoView({ behavior: "smooth", block: "end" });
}

exportJson.addEventListener("click", () => { window.open("/report.json"); });
exportCsv.addEventListener("click", () => { window.open("/report.csv"); });

function escHtml(s) {
  const d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

function escAttr(s) {
  return s.replace(/&/g, "&amp;").replace(/"/g, "&quot;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}
</script>
</body>
</html>
